version: "3.9"

services:
  db:
    image: ankane/pgvector:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: opsbrain
      POSTGRES_PASSWORD: opsbrain
      POSTGRES_DB: opsbrain
    ports:
      - "5432:5432"
    volumes:
      - opsbrain_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsbrain"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://opsbrain:opsbrain@db:5432/opsbrain
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  opsbrain_pg_data:
